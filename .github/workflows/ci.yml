name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: taksees
          POSTGRES_USER: taksees
          POSTGRES_PASSWORD: taksees
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U taksees -d taksees"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://taksees:taksees@localhost:5432/taksees?schema=public
      REDIS_URL: redis://localhost:6379
      STORAGE_DIR: ./storage
      NODE_ENV: test
      PORT: 3000
      LOG_LEVEL: warn
      CORS_ORIGINS: http://localhost:3000
      FILE_SIGNING_SECRET: ci-secret-not-used-in-prod-32bytes
      VAPID_PUBLIC_KEY: ci-vapid-public
      VAPID_PRIVATE_KEY: ci-vapid-private
      VAPID_SUBJECT: mailto:ci@taksees.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Type check + build
        run: pnpm run build

      - name: Test
        run: pnpm run test
        # Tests will be enabled in Phase 1 once real specs exist.

  docker-build:
    name: Docker build (api + worker)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          tags: taksees/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: false
          tags: taksees/worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
